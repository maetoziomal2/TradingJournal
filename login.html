<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziennik Tradera - Logowanie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.1), 0 10px 10px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            transition: all 0.3s ease;
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            color: #1e3a8a;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .form-header p {
            color: #666;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.input-icon {
            position: absolute;
            left: 12px;
            color: #94a3b8;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 40px 12px 40px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #2563eb;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #475569;
            cursor: pointer;
        }

        .remember-me input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .forgot-password {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: #2563eb;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        .btn-submit:hover {
            background: #1d4ed8;
        }

        .form-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #64748b;
        }

        .form-footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        /* Powiadomienia o błędach / sukcesach */
        .alert {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .alert-error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        .alert-success {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="alert-box" class="alert"></div>

        <div id="login-form">
            <div class="form-header">
                <h2>Zaloguj się</h2>
                <p>Witaj w Dzienniku Tradera! Wprowadź dane.</p>
            </div>
            
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="login-email">Adres E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="login-email" placeholder="example@domain.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="login-password">Hasło</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePasswordVisibility('login-password', this)"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember-me-checkbox">
                        <span>Zapamiętaj mnie</span>
                    </label>
                    <a href="#" class="forgot-password">Zapomniałeś hasła?</a>
                </div>

                <button type="submit" class="btn-submit">Zaloguj się</button>
            </form>

            <div class="form-footer">
                Nie masz jeszcze konta? <a href="#" onclick="switchForm('register')">Zarejestruj się</a>
            </div>
        </div>

        <div id="register-form" class="hidden">
            <div class="form-header">
                <h2>Stwórz konto</h2>
                <p>Zapisuj swoje statystyki tradingowe!</p>
            </div>
            
            <form onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label for="reg-name">Imię / Nick</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" id="reg-name" placeholder="Twoje imię" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-email">Adres E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="reg-email" placeholder="example@domain.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-password">Hasło</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="reg-password" placeholder="Minimum 6 znaków" required>
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePasswordVisibility('reg-password', this)"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-password-confirm">Powtórz hasło</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="reg-password-confirm" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePasswordVisibility('reg-password-confirm', this)"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="terms-checkbox" required>
                        <span>Akceptuję regulamin strony</span>
                    </label>
                </div>

                <button type="submit" class="btn-submit">Zarejestruj się</button>
            </form>

            <div class="form-footer">
                Masz już konto? <a href="#" onclick="switchForm('login')">Zaloguj się</a>
            </div>
        </div>

    </div>

    <script>
        const alertBox = document.getElementById('alert-box');

        function showAlert(message, type) {
            alertBox.innerText = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
        }

        // Przełączanie formularzy
        function switchForm(formType) {
            document.getElementById('login-form').classList.toggle('hidden', formType === 'register');
            document.getElementById('register-form').classList.toggle('hidden', formType === 'login');
        }

        // Pokaż / Ukryj Hasło
        function togglePasswordVisibility(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                iconElement.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                iconElement.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // REJESTRACJA (Zapis do localStorage)
        function handleRegister(e) {
            e.preventDefault();
            
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-password-confirm').value;

            if (password !== confirmPassword) {
                showAlert("Hasła nie są identyczne!", "error");
                return;
            }
            if (password.length < 6) {
                showAlert("Hasło musi mieć minimum 6 znaków!", "error");
                return;
            }

            // Zapis użytkownika w pamięci przeglądarki
            const userData = { name, email, password };
            localStorage.setItem(email, JSON.stringify(userData));

            showAlert("Konto utworzone pomyślnie! Możesz się zalogować.", "success");
            setTimeout(() => { switchForm('login'); }, 1500);
        }

        // LOGOWANIE (Sprawdzenie z localStorage)
        function handleLogin(e) {
            e.preventDefault();

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const rememberMe = document.getElementById('remember-me-checkbox').checked;

            const savedUser = localStorage.getItem(email);

            if (!savedUser) {
                showAlert("Nie znaleziono użytkownika o tym adresie e-mail.", "error");
                return;
            }

            const userData = JSON.parse(savedUser);

            if (userData.password !== password) {
                showAlert("Błędne hasło!", "error");
                return;
            }

            // Jeśli zaznaczono "Zapamiętaj mnie", zapisujemy sesję na stałe
            if (rememberMe) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', email);
            } else {
                // Bez zapamiętania – sesja wygaśnie po zamknięciu karty
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('currentUser', email);
            }

            showAlert("Zalogowano pomyślnie! Przekierowanie...", "success");

            // WAŻNE: Przekierowanie do Twojego głównego pliku aplikacji (np. index.html)
            setTimeout(() => {
                window.location.href = 'index.html'; 
            }, 1000);
        }

        // Automatyczne sprawdzenie przy wejściu na stronę logowania:
        // Jeśli użytkownik jest już zalogowany (i kliknął zapamiętaj mnie), od razu rzuć go do panelu
        window.onload = function() {
            if (localStorage.getItem('isLoggedIn') === 'true' || sessionStorage.getItem('isLoggedIn') === 'true') {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
